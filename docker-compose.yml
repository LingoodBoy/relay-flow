services:
  rabbitmq:
    image: rabbitmq:4-management
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  fastapi-agent:
    build:
      context: ./examples/fastapi-agent
    environment:
      OPENAI_BASE_URL: ${OPENAI_BASE_URL}
      OPENAI_MODEL: ${OPENAI_MODEL}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    ports:
      - "8000:8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz', timeout=3)",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  gateway:
    build:
      context: .
      args:
        APP: gateway
    environment:
      RELAYFLOW_RABBITMQ_URL: ${RELAYFLOW_RABBITMQ_URL}
      RELAYFLOW_REDIS_ADDR: ${RELAYFLOW_REDIS_ADDR}
      RELAYFLOW_AGENT_URL: ${RELAYFLOW_AGENT_URL}
      RELAYFLOW_TASK_TIMEOUT_SECONDS: ${RELAYFLOW_TASK_TIMEOUT_SECONDS}
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
      fastapi-agent:
        condition: service_healthy

  worker:
    build:
      context: .
      args:
        APP: worker
    environment:
      RELAYFLOW_RABBITMQ_URL: ${RELAYFLOW_RABBITMQ_URL}
      RELAYFLOW_REDIS_ADDR: ${RELAYFLOW_REDIS_ADDR}
      RELAYFLOW_AGENT_URL: ${RELAYFLOW_AGENT_URL}
      RELAYFLOW_TASK_TIMEOUT_SECONDS: ${RELAYFLOW_TASK_TIMEOUT_SECONDS}
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
      fastapi-agent:
        condition: service_healthy
