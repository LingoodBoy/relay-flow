services:
  gateway:
    build:
      context: .
      args:
        APP: gateway
    cpus: "1.5"
    mem_limit: 1800m
    volumes:
      - ./logs:/app/logs
    ports:
      - "8080:8080"
    environment:
      RELAYFLOW_RABBITMQ_URL: ${RELAYFLOW_RABBITMQ_URL}
      RELAYFLOW_REDIS_ADDR: ${RELAYFLOW_REDIS_ADDR}
      RELAYFLOW_AGENT_URL: ${RELAYFLOW_AGENT_URL}
      RELAYFLOW_GATEWAY_ADDR: ${RELAYFLOW_GATEWAY_ADDR}
      RELAYFLOW_LOG_LEVEL: ${RELAYFLOW_LOG_LEVEL}
      RELAYFLOW_LOG_SAMPLE_RATE: ${RELAYFLOW_LOG_SAMPLE_RATE}
      RELAYFLOW_SLOW_REQUEST_MS: ${RELAYFLOW_SLOW_REQUEST_MS}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT}
      OTEL_EXPORTER_OTLP_INSECURE: ${OTEL_EXPORTER_OTLP_INSECURE}

  worker:
    build:
      context: .
      args:
        APP: worker
    cpus: "0.5"
    mem_limit: 512m
    volumes:
      - ./logs:/app/logs
    ports:
      - "9091:9091"
    environment:
      RELAYFLOW_RABBITMQ_URL: ${RELAYFLOW_RABBITMQ_URL}
      RELAYFLOW_REDIS_ADDR: ${RELAYFLOW_REDIS_ADDR}
      RELAYFLOW_AGENT_URL: ${RELAYFLOW_AGENT_URL}
      RELAYFLOW_AGENT_TIMEOUT_SECONDS: ${RELAYFLOW_AGENT_TIMEOUT_SECONDS}
      RELAYFLOW_WORKER_CONCURRENCY: ${RELAYFLOW_WORKER_CONCURRENCY}
      RELAYFLOW_WORKER_METRICS_ADDR: ${RELAYFLOW_WORKER_METRICS_ADDR}
      RELAYFLOW_MAX_ATTEMPTS: ${RELAYFLOW_MAX_ATTEMPTS}
      RELAYFLOW_LOG_LEVEL: ${RELAYFLOW_LOG_LEVEL}
      RELAYFLOW_LOG_SAMPLE_RATE: ${RELAYFLOW_LOG_SAMPLE_RATE}
      RELAYFLOW_SLOW_REQUEST_MS: ${RELAYFLOW_SLOW_REQUEST_MS}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT}
      OTEL_EXPORTER_OTLP_INSECURE: ${OTEL_EXPORTER_OTLP_INSECURE}

  event-processor:
    build:
      context: .
      args:
        APP: event-processor
    cpus: "0.5"
    mem_limit: 512m
    volumes:
      - ./logs:/app/logs
    ports:
      - "9092:9092"
    environment:
      RELAYFLOW_RABBITMQ_URL: ${RELAYFLOW_RABBITMQ_URL}
      RELAYFLOW_REDIS_ADDR: ${RELAYFLOW_REDIS_ADDR}
      RELAYFLOW_PROCESSOR_METRICS_ADDR: ${RELAYFLOW_PROCESSOR_METRICS_ADDR}
      RELAYFLOW_LOG_LEVEL: ${RELAYFLOW_LOG_LEVEL}
      RELAYFLOW_LOG_SAMPLE_RATE: ${RELAYFLOW_LOG_SAMPLE_RATE}
      RELAYFLOW_SLOW_REQUEST_MS: ${RELAYFLOW_SLOW_REQUEST_MS}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT}
      OTEL_EXPORTER_OTLP_INSECURE: ${OTEL_EXPORTER_OTLP_INSECURE}
