services:
  gateway:
    build:
      context: .
      args:
        APP: gateway
    volumes:
      - ./logs:/app/logs
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8080:8080"
    environment:
      RELAYFLOW_RABBITMQ_URL: ${RELAYFLOW_RABBITMQ_URL}
      RELAYFLOW_REDIS_ADDR: ${RELAYFLOW_REDIS_ADDR}
      RELAYFLOW_AGENT_URL: ${RELAYFLOW_AGENT_URL}
      RELAYFLOW_GATEWAY_ADDR: ${RELAYFLOW_GATEWAY_ADDR}
      RELAYFLOW_TASK_TIMEOUT_SECONDS: ${RELAYFLOW_TASK_TIMEOUT_SECONDS}

  worker:
    build:
      context: .
      args:
        APP: worker
    volumes:
      - ./logs:/app/logs
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      RELAYFLOW_RABBITMQ_URL: ${RELAYFLOW_RABBITMQ_URL}
      RELAYFLOW_REDIS_ADDR: ${RELAYFLOW_REDIS_ADDR}
      RELAYFLOW_AGENT_URL: ${RELAYFLOW_AGENT_URL}
      RELAYFLOW_TASK_TIMEOUT_SECONDS: ${RELAYFLOW_TASK_TIMEOUT_SECONDS}
      RELAYFLOW_WORKER_CONCURRENCY: ${RELAYFLOW_WORKER_CONCURRENCY}
